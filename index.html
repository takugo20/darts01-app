<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Darts 501</title>

<style>
body { margin:0; background:#111; overflow:hidden; color:white; font-family:sans-serif; }
canvas { display:block; }
#ui { position:fixed; top:10px; left:10px; font-size:18px; }
#overlay {
  position:fixed; top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:80px; color:gold;
  opacity:0; transition:.3s;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<div id="ui">
SCORE: <span id="score">501</span><br>
ROUND: <span id="round">1</span><br>
THROW: <span id="throw">1</span>
</div>

<div id="overlay"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let W,H,boardX,boardY,boardR;

let aiming=false, aimX=0, aimY=0;
let spread=40, spreadDir=-1;

let dartFlying=false;
let dart=null;

function resize(){
  W = canvas.width = innerWidth;
  H = canvas.height = innerHeight;
  boardX = W/2;
  boardY = H/2;
  boardR = Math.min(W,H)0.35;
}
addEventListener("resize",resize);
resize();

// ===== ボード =====
function drawBoard(){
  ctx.save();
  ctx.translate(boardX, boardY);

  const slice = Math.PI2/20;
  const start = -Math.PI/2 - slice/2;

  for(let i=0;i<20;i++){
    let a1 = start + islice;
    let a2 = a1 + slice;

    drawSector(a1,a2,boardR0.6,boardR0.95,i%2?"#eee":"#111");
    drawSector(a1,a2,boardR0.5,boardR0.6,i%2?"#2a2":"#c22");
    drawSector(a1,a2,boardR0.2,boardR0.5,i%2?"#eee":"#111");
    drawSector(a1,a2,boardR0.95,boardR,i%2?"#2a2":"#c22");
  }

  drawCircle(boardR0.2,"#2a2");
  drawCircle(boardR0.08,"#c22");

  ctx.restore();
}

function drawSector(a1,a2,r1,r2,color){
  ctx.beginPath();
  ctx.arc(0,0,r2,a1,a2);
  ctx.arc(0,0,r1,a2,a1,true);
  ctx.closePath();
  ctx.fillStyle=color;
  ctx.fill();
}

function drawCircle(r,color){
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI2);
  ctx.fillStyle=color;
  ctx.fill();
}

// ===== ダーツ =====
function drawDart(){
  if(!dart) return;

  let scale = 1 - dart.t0.7;

  ctx.save();
  ctx.translate(dart.x, dart.y);
  ctx.scale(scale, scale);

  // 三菱マーク
  ctx.fillStyle="red";
  for(let i=0;i<3;i++){
    ctx.save();
    ctx.rotate(iMath.PI2/3);
    ctx.beginPath();
    ctx.moveTo(0,-10);
    ctx.lineTo(6,0);
    ctx.lineTo(0,10);
    ctx.lineTo(-6,0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

// ===== 照準 =====
function drawAim(){
  if(!aiming) return;

  ctx.beginPath();
  ctx.arc(aimX,aimY,spread,0,Math.PI2);
  ctx.strokeStyle="white";
  ctx.stroke();
}

function updateAim(){
  if(!aiming) return;

  spread += spreadDir4;
  if(spread<10){spread=10;spreadDir=1;}
  if(spread>80){spread=80;spreadDir=-1;}
}

// ===== 入力 =====
canvas.addEventListener("pointerdown",e=>{
  aiming=true;
  aimX=e.clientX;
  aimY=e.clientY;
});

canvas.addEventListener("pointerup",()=>{
  if(!aiming || dartFlying) return;

  aiming=false;

  let a = Math.random()Math.PI2;
  let d = Math.random()*spread;

  let tx = aimX + Math.cos(a)*d;
  let ty = aimY + Math.sin(a)*d;

  dart = { sx:W/2, sy:H+100, tx, ty, x:W/2, y:H+100, t:0 };
  dartFlying = true;
});

// ===== 更新 =====
function updateDart(){
  if(!dartFlying) return;

  dart.t += 0.04;

  if(dart.t>=1){
    dartFlying=false;
  }

  let t = dart.t;
  dart.x = dart.sx + (dart.tx - dart.sx)*t;
  let baseY = dart.sy + (dart.ty - dart.sy)t;
  dart.y = baseY - Math.sin(tMath.PI)*150;
}

// ===== ループ =====
function loop(){
  ctx.clearRect(0,0,W,H);

  updateAim();
  updateDart();

  drawBoard();
  drawAim();
  drawDart();

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
