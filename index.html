<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Darts 501</title>

<style>
body { margin:0; background:#111; overflow:hidden; color:white; font-family:sans-serif; }
canvas { display:block; }

#ui {
  position:fixed;
  top:10px;
  left:10px;
  font-size:18px;
}

#overlay {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:80px;
  font-weight:bold;
  color:gold;
  opacity:0;
  pointer-events:none;
  transition:.3s;
}

#award {
  position:fixed;
  bottom:20%;
  width:100%;
  text-align:center;
  font-size:36px;
  color:#00e0ff;
  opacity:0;
  transition:.5s;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<div id="ui">
  SCORE: <span id="score">501</span><br>
  ROUND: <span id="round">1</span><br>
  THROW: <span id="throw">1</span>
</div>

<div id="overlay"></div>
<div id="award"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const roundEl = document.getElementById("round");
const throwEl = document.getElementById("throw");
const overlay = document.getElementById("overlay");
const awardEl = document.getElementById("award");

let W,H,boardX,boardY,boardR;

let aiming=false, aimX=0, aimY=0;
let spread=40, spreadDir=-1;

let dartFlying=false;
let dart=null;
let darts=[];

// ===== ゲーム状態 =====
let score=501;
let round=1;
let throwCount=1;
let roundStartScore=501;
let roundScores=[];

// ===== Audio =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playHitSound(s){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);

  osc.frequency.value = 300 + s8;
  osc.type = s>=50 ? "sawtooth" : "square";
  gain.gain.value = 0.2;

  osc.start();
  osc.stop(audioCtx.currentTime + 0.1 + s/300);
}

function playBustSound(){
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);

  osc.frequency.setValueAtTime(200, audioCtx.currentTime);
  osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime+0.4);
  gain.gain.value = 0.3;

  osc.start();
  osc.stop(audioCtx.currentTime+0.4);
}

function playFanfare(){
  [400,600,800].forEach((f,i)=>{
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.connect(gain); gain.connect(audioCtx.destination);

    osc.frequency.value=f;
    gain.gain.value=0.2;

    osc.start(audioCtx.currentTime + i0.1);
    osc.stop(audioCtx.currentTime + i0.1 + 0.2);
  });
}

// ===== リサイズ =====
function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  boardX=W/2;
  boardY=H/2;
  boardR=Math.min(W,H)0.38;
}
addEventListener("resize",resize);
resize();

// ===== ボード =====
function drawBoard(){
  ctx.save();
  ctx.translate(boardX,boardY);

  const nums=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
  const slice=Math.PI2/20;
  const start=-Math.PI/2 - slice/2;

  for(let i=0;i<20;i++){
    let a1=start+islice;
    let a2=a1+slice;

    drawSector(a1,a2,boardR0.62,boardR0.95,i%2?"#eee":"#111");
    drawSector(a1,a2,boardR0.52,boardR0.62,i%2?"#2a2":"#c22");
    drawSector(a1,a2,boardR0.18,boardR0.52,i%2?"#eee":"#111");
    drawSector(a1,a2,boardR0.95,boardR,i%2?"#2a2":"#c22");
  }

  drawCircle(boardR0.18,"#2a2");
  drawCircle(boardR0.08,"#c22");

  ctx.restore();
}

function drawSector(a1,a2,r1,r2,color){
  ctx.beginPath();
  ctx.arc(boardX,boardY,r2,a1,a2);
  ctx.arc(boardX,boardY,r1,a2,a1,true);
  ctx.closePath();
  ctx.fillStyle=color;
  ctx.fill();
}

function drawCircle(r,color){
  ctx.beginPath();
  ctx.arc(boardX,boardY,r,0,Math.PI2);
  ctx.fillStyle=color;
  ctx.fill();
}

// ===== 三菱ダーツ =====
function drawMitsubishi(){
  ctx.fillStyle="#e60012";
  for(let i=0;i<3;i++){
    ctx.save();
    ctx.rotate(iMath.PI2/3);
    ctx.beginPath();
    ctx.moveTo(0,-10);
    ctx.lineTo(6,0);
    ctx.lineTo(0,10);
    ctx.lineTo(-6,0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawStuck(){
  darts.forEach(d=>{
    ctx.save();
    ctx.translate(d.x,d.y);
    drawMitsubishi();
    ctx.restore();
  });
}

function drawDart(){
  if(!dart) return;

  let scale=1 - dart.t0.7;
  ctx.save();
  ctx.translate(dart.x,dart.y);
  ctx.scale(scale,scale);
  drawMitsubishi();
  ctx.restore();
}

// ===== 照準 =====
function drawAim(){
  if(!aiming) return;

  ctx.beginPath();
  ctx.arc(aimX,aimY,spread,0,Math.PI2);
  ctx.strokeStyle="white";
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(aimX-10,aimY);
  ctx.lineTo(aimX+10,aimY);
  ctx.moveTo(aimX,aimY-10);
  ctx.lineTo(aimX,aimY+10);
  ctx.stroke();
}

function updateAim(){
  if(!aiming) return;

  spread += spreadDir4;
  if(spread<10){spread=10;spreadDir=1;}
  if(spread>80){spread=80;spreadDir=-1;}
}

// ===== 入力 =====
canvas.addEventListener("pointerdown",e=>{
  if(dartFlying) return;
  aiming=true;
  aimX=e.clientX;
  aimY=e.clientY;
});
canvas.addEventListener("pointermove",e=>{
  if(aiming){
    aimX=e.clientX;
    aimY=e.clientY;
  }
});
canvas.addEventListener("pointerup",()=>{
  if(!aiming||dartFlying) return;
  aiming=false;

  let a=Math.random()Math.PI2;
  let d=Math.random()spread;

  let tx=aimX+Math.cos(a)d;
  let ty=aimY+Math.sin(a)d;

  dart={sx:W/2,sy:H+100,tx,ty,x:W/2,y:H+100,t:0};
  dartFlying=true;
});

// ===== ダーツ =====
function updateDart(){
  if(!dartFlying) return;

  dart.t+=0.04;

  if(dart.t>=1){
    dartFlying=false;

    let s=calcScore(dart.tx,dart.ty);

    // バースト
    if(score - s < 0){
      playBustSound();
      overlay.textContent="BUST";
      showOverlay();

      score = roundStartScore;
      nextRound();
      return;
    }

    score -= s;
    roundScores.push(s);

    playHitSound(s);

    overlay.textContent=s;
    showOverlay();

    darts.push({x:dart.tx,y:dart.ty});

    nextThrow();
  }

  let t=dart.t;
  dart.x = lerp(dart.sx,dart.tx,t);
  let baseY = lerp(dart.sy,dart.ty,t);
  dart.y = baseY - Math.sin(tMath.PI)150;
}

function showOverlay(){
  overlay.style.opacity=1;
  setTimeout(()=>overlay.style.opacity=0,500);
}

// ===== ラウンド =====
function nextThrow(){
  throwCount++;
  if(throwCount>3){
    checkAward();
    nextRound();
  }
  updateUI();
}

function nextRound(){
  round++;
  throwCount=1;
  roundStartScore=score;
  roundScores=[];
  darts=[];
  updateUI();
}

// ===== アワード =====
function checkAward(){
  const sum = roundScores.reduce((a,b)=>a+b,0);

  let award="";

  if(sum===180) award="TON 80";
  else if(sum>=151) award="HIGH TON";
  else if(sum>=100) award="LOW TON";

  if(roundScores.filter(s=>s===50).length===3) award="HAT TRICK";

  if(award){
    awardEl.textContent=award;
    awardEl.style.opacity=1;
    playFanfare();
    setTimeout(()=>awardEl.style.opacity=0,1500);
  }
}

// ===== 計算 =====
function calcScore(x,y){
  let dx=x-boardX;
  let dy=y-boardY;
  let r=Math.sqrt(dxdx+dydy);

  if(r>boardR) return 0;
  if(r<boardR0.08) return 50;
  if(r<boardR0.18) return 25;

  let angle=Math.atan2(dy,dx)+Math.PI/2;
  if(angle<0) angle+=Math.PI2;

  let nums=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
  let i=Math.floor(angle/(Math.PI2/20));
  let base=nums[i];

  if(r>boardR0.95) return base2;
  if(r>boardR0.52 && r<boardR0.62) return base*3;

  return base;
}

function lerp(a,b,t){ return a+(b-a)*t; }

// ===== UI =====
function updateUI(){
  scoreEl.textContent=score;
  roundEl.textContent=round;
  throwEl.textContent=throwCount;
}

// ===== ループ =====
function loop(){
  ctx.clearRect(0,0,W,H);

  updateAim();
  updateDart();

  drawBoard();
  drawStuck();
  drawAim();
  drawDart();

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
