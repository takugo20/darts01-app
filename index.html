<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Darts 501</title>

<style>
body {
  margin: 0;
  background: #111;
  overflow: hidden;
  color: white;
  font-family: sans-serif;
}

canvas {
  display: block;
}

#ui {
  position: fixed;
  top: 10px;
  left: 10px;
  font-size: 18px;
}

#overlay {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 80px;
  font-weight: bold;
  color: gold;
  opacity: 0;
  transition: 0.3s;
}
</style>
</head>

<body>
<canvas id="game"></canvas>

<div id="ui">
  SCORE: <span id="score">501</span><br>
  ROUND: <span id="round">1</span><br>
  THROW: <span id="throw">1</span>
</div>

<div id="overlay"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const roundEl = document.getElementById("round");
const throwEl = document.getElementById("throw");
const overlay = document.getElementById("overlay");

let W,H,boardX,boardY,boardR;

let aiming=false;
let aimX=0,aimY=0;
let spread=40,spreadDir=-1;

let dartFlying=false;
let dart=null;

// ★刺さったダーツ保存
let darts=[];

// ★501ルール
let score=501;
let round=1;
let throwCount=1;
let roundStartScore=501;

function resize(){
  W=canvas.width=innerWidth;
  H=canvas.height=innerHeight;
  boardX=W/2;
  boardY=H/2;
  boardR=Math.min(W,H)*0.38;
}
addEventListener("resize",resize);
resize();

function drawBoard(){
  ctx.save();
  ctx.translate(boardX,boardY);

  const nums=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
  const slice=Math.PI*2/20;
  const start=-Math.PI/2 - slice/2;

  for(let i=0;i<20;i++){
    let a1=start+i*slice;
    let a2=a1+slice;

    drawSector(a1,a2,boardR*0.62,boardR*0.95,i%2?"#eee":"#111");
    drawSector(a1,a2,boardR*0.52,boardR*0.62,i%2?"#2a2":"#c22");
    drawSector(a1,a2,boardR*0.18,boardR*0.52,i%2?"#eee":"#111");
    drawSector(a1,a2,boardR*0.95,boardR,i%2?"#2a2":"#c22");
  }

  drawCircle(boardR*0.18,"#2a2");
  drawCircle(boardR*0.08,"#c22");

  ctx.restore();
}

function drawSector(a1,a2,r1,r2,color){
  ctx.beginPath();
  ctx.arc(boardX,boardY,r2,a1,a2);
  ctx.arc(boardX,boardY,r1,a2,a1,true);
  ctx.closePath();
  ctx.fillStyle=color;
  ctx.fill();
}

function drawCircle(r,color){
  ctx.beginPath();
  ctx.arc(boardX,boardY,r,0,Math.PI*2);
  ctx.fillStyle=color;
  ctx.fill();
}

// ★刺さったダーツ描画（ひし形）
function drawStuckDarts(){
  darts.forEach(d=>{
    ctx.save();
    ctx.translate(d.x,d.y);

    ctx.fillStyle="red";

    ctx.beginPath();
    ctx.moveTo(0,-8);
    ctx.lineTo(6,0);
    ctx.lineTo(0,8);
    ctx.lineTo(-6,0);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  });
}

// ★飛んでるダーツ（縮小して奥行き演出）
function drawDart(){
  if(!dart) return;

  let scale=1 - dart.t*0.7;

  ctx.save();
  ctx.translate(dart.x,dart.y);
  ctx.scale(scale,scale);

  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.moveTo(0,-10);
  ctx.lineTo(7,0);
  ctx.lineTo(0,10);
  ctx.lineTo(-7,0);
  ctx.closePath();
  ctx.fill();

  ctx.restore();
}

function drawAim(){
  if(!aiming) return;

  ctx.beginPath();
  ctx.arc(aimX,aimY,spread,0,Math.PI*2);
  ctx.strokeStyle="white";
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(aimX-10,aimY);
  ctx.lineTo(aimX+10,aimY);
  ctx.moveTo(aimX,aimY-10);
  ctx.lineTo(aimX,aimY+10);
  ctx.stroke();
}

function updateAim(){
  if(!aiming) return;

  spread += spreadDir*4;

  if(spread<10){spread=10;spreadDir=1;}
  if(spread>80){spread=80;spreadDir=-1;}
}

function startAim(x,y){
  if(dartFlying) return;
  aiming=true;
  aimX=x;
  aimY=y;
}

function moveAim(x,y){
  if(!aiming) return;
  aimX=x;
  aimY=y;
}

function throwDart(){
  if(!aiming||dartFlying) return;
  aiming=false;

  let a=Math.random()*Math.PI*2;
  let d=Math.random()*spread;

  let tx=aimX+Math.cos(a)*d;
  let ty=aimY+Math.sin(a)*d;

  dart={
    sx:W/2,
    sy:H+100,
    tx,ty,
    x:W/2,
    y:H+100,
    t:0
  };

  dartFlying=true;
}

function updateDart(){
  if(!dartFlying) return;

  dart.t+=0.04;

  if(dart.t>=1){
    dart.t=1;
    dartFlying=false;

    let s=calcScore(dart.tx,dart.ty);

    // ★バースト判定
    if(score - s < 0){
      overlay.textContent="BUST";
      overlay.style.opacity=1;

      setTimeout(()=>{
        overlay.style.opacity=0;
      },800);

      score = roundStartScore;

      nextRound();
      return;
    }

    score -= s;

    overlay.textContent=s;
    overlay.style.opacity=1;
    setTimeout(()=>overlay.style.opacity=0,500);

    // ★刺さる
    darts.push({x:dart.tx,y:dart.ty});

    nextThrow();
  }

  let t=dart.t;
  dart.x = lerp(dart.sx,dart.tx,t);
  let baseY = lerp(dart.sy,dart.ty,t);
  dart.y = baseY - Math.sin(t*Math.PI)*150;
}

function nextThrow(){
  throwCount++;

  if(throwCount>3){
    nextRound();
  }

  updateUI();
}

function nextRound(){
  round++;
  throwCount=1;
  roundStartScore=score;

  updateUI();
}

function updateUI(){
  scoreEl.textContent=score;
  roundEl.textContent=round;
  throwEl.textContent=throwCount;
}

function lerp(a,b,t){
  return a+(b-a)*t;
}

function calcScore(x,y){
  let dx=x-boardX;
  let dy=y-boardY;
  let r=Math.sqrt(dx*dx+dy*dy);

  if(r>boardR) return 0;
  if(r<boardR*0.08) return 50;
  if(r<boardR*0.18) return 25;

  let angle=Math.atan2(dy,dx)+Math.PI/2;
  if(angle<0) angle+=Math.PI*2;

  let nums=[20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
  let i=Math.floor(angle/(Math.PI*2/20));
  let base=nums[i];

  if(r>boardR*0.95) return base*2;
  if(r>boardR*0.52 && r<boardR*0.62) return base*3;

  return base;
}

canvas.addEventListener("pointerdown",e=>{
  startAim(e.clientX,e.clientY);
});
canvas.addEventListener("pointermove",e=>{
  moveAim(e.clientX,e.clientY);
});
canvas.addEventListener("pointerup",()=>{
  throwDart();
});

function loop(){
  ctx.clearRect(0,0,W,H);

  updateAim();
  updateDart();

  drawBoard();
  drawStuckDarts();
  drawAim();
  drawDart();

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
