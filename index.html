<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Darts 501</title>
<style>
body{margin:0;background:#111;overflow:hidden;color:#fff;font-family:sans-serif}
canvas{display:block}
#ui{position:fixed;top:10px;left:10px;font-size:18px;line-height:1.4}
#overlay{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-size:80px;font-weight:bold;color:gold;
  opacity:0;pointer-events:none;transition:.25s
}
#award{
  position:fixed;bottom:20%;width:100%;
  text-align:center;font-size:36px;color:#00e0ff;
  opacity:0;pointer-events:none;transition:.4s
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  SCORE: <span id="score">501</span><br>
  ROUND: <span id="round">1</span><br>
  THROW: <span id="throw">1</span>
</div>
<div id="overlay"></div>
<div id="award"></div>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const roundEl = document.getElementById("round");
const throwEl = document.getElementById("throw");
const overlay = document.getElementById("overlay");
const awardEl = document.getElementById("award");

// ===== 画面・ボード =====
let W,H,boardX,boardY,boardR;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  boardX = W/2;
  boardY = H/2;
  boardR = Math.min(W,H) * 0.36; // 中央に確実に収まる
}
window.addEventListener("resize", resize);
resize();

// ===== 入力・照準 =====
let aiming=false, aimX=0, aimY=0;
let spread=40, spreadDir=-1;

// ===== ダーツ状態 =====
let dartFlying=false;
let dart=null;
let stuckDarts=[]; // ラウンド内の刺さり

// ===== 501 =====
let score=501;
let round=1;
let throwCount=1;
let roundStartScore=501;
let roundScores=[];

// ===== Audio（iOS対策あり） =====
const audioCtx = new (window.AudioContext||window.webkitAudioContext)();
function unlockAudio(){ if(audioCtx.state==="suspended") audioCtx.resume(); }

function playHitSound(s){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.value = 300 + s*8;
  o.type = (s>=50) ? "sawtooth" : "square";
  g.gain.value = 0.2;
  o.start();
  o.stop(audioCtx.currentTime + 0.08 + s/300);
}

function playBustSound(){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.frequency.setValueAtTime(220, audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(80, audioCtx.currentTime+0.35);
  g.gain.value = 0.3;
  o.start();
  o.stop(audioCtx.currentTime+0.35);
}

function playFanfare(){
  [400,600,800].forEach((f,i)=>{
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.connect(g); g.connect(audioCtx.destination);
    o.frequency.value = f;
    g.gain.value = 0.22;
    o.start(audioCtx.currentTime + i*0.1);
    o.stop(audioCtx.currentTime + i*0.1 + 0.2);
  });
}

// ===== ボード描画（translate後は(0,0)基準）=====
const numbers = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];

function drawBoard(){
  ctx.save();
  ctx.translate(boardX, boardY);

  const slice = Math.PI*2/20;
  const start = -Math.PI/2 - slice/2;

  for(let i=0;i<20;i++){
    const a1 = start + i*slice;
    const a2 = a1 + slice;

    drawSector(a1,a2, boardR*0.62, boardR*0.95, i%2 ? "#eee" : "#111");
    drawSector(a1,a2, boardR*0.52, boardR*0.62, i%2 ? "#2a2" : "#c22");
    drawSector(a1,a2, boardR*0.18, boardR*0.52, i%2 ? "#eee" : "#111");
    drawSector(a1,a2, boardR*0.95, boardR, i%2 ? "#2a2" : "#c22");

    // 数字
    const mid = (a1+a2)/2;
    ctx.fillStyle="#fff";
    ctx.font = `${boardR*0.08}px sans-serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText(numbers[i],
      Math.cos(mid)*boardR*1.12,
      Math.sin(mid)*boardR*1.12
    );
  }

  // ブル
  drawCircle(boardR*0.18, "#2a2"); // outer bull (25)
  drawCircle(boardR*0.08, "#c22"); // inner bull (50)

  ctx.restore();
}

function drawSector(a1,a2,r1,r2,color){
  ctx.beginPath();
  ctx.arc(0,0,r2,a1,a2);
  ctx.arc(0,0,r1,a2,a1,true);
  ctx.closePath();
  ctx.fillStyle=color;
  ctx.fill();
}

function drawCircle(r,color){
  ctx.beginPath();
  ctx.arc(0,0,r,0,Math.PI*2);
  ctx.fillStyle=color;
  ctx.fill();
}

// ===== 三菱ダーツ =====
function drawMitsubishi(){
  ctx.fillStyle="#e60012";
  for(let i=0;i<3;i++){
    ctx.save();
    ctx.rotate(i * Math.PI * 2 / 3);
    ctx.beginPath();
    ctx.moveTo(0,-10);
    ctx.lineTo(6,0);
    ctx.lineTo(0,10);
    ctx.lineTo(-6,0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
}

function drawStuck(){
  stuckDarts.forEach(d=>{
    ctx.save();
    ctx.translate(d.x, d.y);
    drawMitsubishi();
    ctx.restore();
  });
}

function drawDart(){
  if(!dart) return;
  const scale = 1 - dart.t*0.7;
  ctx.save();
  ctx.translate(dart.x, dart.y);
  ctx.scale(scale, scale);
  drawMitsubishi();
  ctx.restore();
}

// ===== 照準 =====
function drawAim(){
  if(!aiming) return;

  ctx.beginPath();
  ctx.arc(aimX, aimY, spread, 0, Math.PI*2);
  ctx.strokeStyle="#fff";
  ctx.lineWidth=2;
  ctx.stroke();

  // クロスヘア
  ctx.beginPath();
  ctx.moveTo(aimX-12, aimY); ctx.lineTo(aimX+12, aimY);
  ctx.moveTo(aimX, aimY-12); ctx.lineTo(aimX, aimY+12);
  ctx.stroke();
}

function updateAim(){
  if(!aiming) return;
  spread += spreadDir * 4; // 速め
  if(spread < 10){ spread=10; spreadDir=1; }
  if(spread > 80){ spread=80; spreadDir=-1; }
}

// ===== 入力 =====
canvas.addEventListener("pointerdown", e=>{
  unlockAudio();
  if(dartFlying) return;
  aiming = true;
  aimX = e.clientX;
  aimY = e.clientY;
});

canvas.addEventListener("pointermove", e=>{
  if(!aiming) return;
  aimX = e.clientX;
  aimY = e.clientY;
});

canvas.addEventListener("pointerup", ()=>{
  if(!aiming || dartFlying) return;
  aiming = false;

  const a = Math.random() * Math.PI * 2;
  const d = Math.random() * spread;

  const tx = aimX + Math.cos(a) * d;
  const ty = aimY + Math.sin(a) * d;

  dart = { sx: W/2, sy: H+100, tx, ty, x: W/2, y: H+100, t: 0 };
  dartFlying = true;
});

// ===== ダーツ更新 =====
function updateDart(){
  if(!dartFlying) return;

  dart.t += 0.04;

  if(dart.t >= 1){
    dart.t = 1;
    dartFlying = false;

    const {score: s, ring, base} = calcScore(dart.tx, dart.ty);

    // バースト
    if(score - s < 0){
      playBustSound();
      showOverlay("BUST", 800);
      score = roundStartScore;
      nextRound();
      return;
    }

    score -= s;
    roundScores.push({score:s, ring, base});

    playHitSound(s);
    showOverlay(s, 500);

    stuckDarts.push({x:dart.tx, y:dart.ty});

    nextThrow();
  }

  const t = dart.t;
  dart.x = lerp(dart.sx, dart.tx, t);
  const baseY = lerp(dart.sy, dart.ty, t);
  dart.y = baseY - Math.sin(t*Math.PI) * 150; // 放物線
}

function showOverlay(text, ms){
  overlay.textContent = text;
  overlay.style.opacity = 1;
  setTimeout(()=> overlay.style.opacity = 0, ms||500);
}

// ===== ラウンド進行 =====
function nextThrow(){
  throwCount++;
  if(throwCount > 3){
    checkAward();
    nextRound();
  }
  updateUI();
}

function nextRound(){
  round++;
  throwCount = 1;
  roundStartScore = score;
  roundScores = [];
  stuckDarts = []; // ラウンドでリセット
  updateUI();
}

// ===== アワード =====
function checkAward(){
  const sum = roundScores.reduce((a,b)=>a + b.score, 0);

  let award = "";

  // TON系
  if(sum === 180) award = "TON 80";
  else if(sum >= 151) award = "HIGH TON";
  else if(sum >= 100) award = "LOW TON";

  // HAT TRICK（インブル3本）
  if(roundScores.filter(x=>x.score===50).length === 3){
    award = "HAT TRICK";
  }

  // THREE IN A BED（同一ナンバーのトリプル3本）
  const triples = roundScores.filter(x=>x.ring==="T");
  if(triples.length === 3){
    const same = triples.every(x=>x.base === triples[0].base);
    if(same) award = "THREE IN A BED";
  }

  // THREE IN THE BLACK（トリプル20×3）
  if(triples.length === 3 && triples.every(x=>x.base===20)){
    award = "THREE IN THE BLACK";
  }

  // WHITE HORSE（3本とも別ナンバーのトリプル）
  if(triples.length === 3){
    const set = new Set(triples.map(x=>x.base));
    if(set.size === 3) award = "WHITE HORSE";
  }

  if(award){
    awardEl.textContent = award;
    awardEl.style.opacity = 1;
    playFanfare();
    setTimeout(()=> awardEl.style.opacity = 0, 1500);
  }
}

// ===== スコア計算 =====
function calcScore(x,y){
  const dx = x - boardX;
  const dy = y - boardY;
  const r = Math.sqrt(dx*dx + dy*dy);

  if(r > boardR) return {score:0, ring:"MISS", base:0};

  if(r <= boardR*0.08) return {score:50, ring:"IB", base:25};
  if(r <= boardR*0.18) return {score:25, ring:"OB", base:25};

  let angle = Math.atan2(dy, dx) + Math.PI/2;
  if(angle < 0) angle += Math.PI*2;

  const idx = Math.floor((angle + (Math.PI*2/20)/2) / (Math.PI*2/20)) % 20;
  const base = numbers[idx];

  if(r >= boardR*0.95) return {score:base*2, ring:"D", base};
  if(r >= boardR*0.52 && r <= boardR*0.62) return {score:base*3, ring:"T", base};

  return {score:base, ring:"S", base};
}

function lerp(a,b,t){ return a + (b-a)*t; }

// ===== UI =====
function updateUI(){
  scoreEl.textContent = score;
  roundEl.textContent = round;
  throwEl.textContent = throwCount;
}

// ===== ループ =====
function loop(){
  ctx.clearRect(0,0,W,H);

  updateAim();
  updateDart();

  drawBoard();   // ← 中央に必ず出る
  drawStuck();
  drawAim();
  drawDart();

  requestAnimationFrame(loop);
}
loop();
</script>

  </body>
</html>
