<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Darts 501</title>
<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: #111;
    overflow: hidden;
    color: #fff;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: none;
  }

  #ui {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 10;
    padding: 10px 12px;
    border-radius: 10px;
    background: rgba(0, 0, 0, 0.45);
    font-size: 18px;
    line-height: 1.45;
  }

  #debug {
    display: block;
    margin-top: 6px;
    font-size: 12px;
    color: #9f9;
  }

  #scoreOverlay,
  #awardOverlay {
    position: fixed;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    text-align: center;
    text-shadow: 0 4px 18px rgba(0, 0, 0, 0.85);
  }

  #scoreOverlay {
    top: 43%;
    font-size: 82px;
    font-weight: 900;
    color: gold;
  }

  #awardOverlay {
    top: 62%;
    font-size: 40px;
    font-weight: 900;
    color: #00eaff;
    white-space: pre-line;
  }

  #scoreOverlay.show,
  #awardOverlay.show {
    opacity: 1;
    transform: translateX(-50%) scale(1.08);
  }

  #resultScreen {
    position: fixed;
    inset: 0;
    z-index: 30;
    display: none;
    overflow: auto;
    padding: 24px;
    background: rgba(0, 0, 0, 0.92);
  }

  #resultScreen.show {
    display: block;
  }

  .resultBox {
    max-width: 900px;
    margin: 0 auto;
    padding: 22px;
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 18px;
    background: rgba(255, 255, 255, 0.08);
  }

  .resultTitle {
    margin: 0 0 10px;
    font-size: 42px;
    color: gold;
    text-align: center;
  }

  .resultSummary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin: 18px 0;
  }

  .summaryCard {
    padding: 12px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.1);
    text-align: center;
  }

  .summaryCard strong {
    display: block;
    margin-top: 4px;
    font-size: 28px;
    color: #fff;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 12px;
    font-size: 14px;
  }

  th, td {
    border-bottom: 1px solid rgba(255, 255, 255, 0.18);
    padding: 8px;
    text-align: center;
  }

  th {
    color: #00eaff;
  }

  .resultButton {
    display: block;
    margin: 18px auto 0;
    padding: 12px 22px;
    border: none;
    border-radius: 999px;
    background: gold;
    color: #111;
    font-weight: 800;
    font-size: 16px;
  }

  @media (max-width: 700px) {
    #ui { font-size: 15px; }
    #scoreOverlay { font-size: 60px; }
    #awardOverlay { font-size: 26px; }
    .resultSummary { grid-template-columns: 1fr; }
    table { font-size: 12px; }
    th, td { padding: 6px 3px; }
  }
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="ui">
  SCORE: <span id="scoreText">501</span><br>
  ROUND: <span id="roundText">1</span><br>
  THROW: <span id="throwText">1 / 3</span><br>
  ROUND SCORE: <span id="roundScoreText">0</span>
  <span id="debug">DEBUG: checking...</span>
</div>

<div id="scoreOverlay"></div>
<div id="awardOverlay"></div>

<div id="resultScreen">
  <div class="resultBox">
    <h1 class="resultTitle">GAME CLEAR!</h1>

    <div class="resultSummary">
      <div class="summaryCard">ROUNDS<strong id="resultRounds">0</strong></div>
      <div class="summaryCard">THROWS<strong id="resultThrows">0</strong></div>
      <div class="summaryCard">AWARDS<strong id="resultAwards">0</strong></div>
    </div>

    <h2>1投ごとの点数一覧</h2>
    <div id="historyTable"></div>

    <button class="resultButton" id="restartBtn">NEW GAME</button>
  </div>
</div>

<script>
(() => {
  "use strict";

  const DEBUG_MODE = true;

  const canvas = document.getElementById("game");
  const ctx = canvas.getContext("2d");

  const scoreText = document.getElementById("scoreText");
  const roundText = document.getElementById("roundText");
  const throwText = document.getElementById("throwText");
  const roundScoreText = document.getElementById("roundScoreText");
  const debugText = document.getElementById("debug");

  const scoreOverlay = document.getElementById("scoreOverlay");
  const awardOverlay = document.getElementById("awardOverlay");

  const resultScreen = document.getElementById("resultScreen");
  const resultRounds = document.getElementById("resultRounds");
  const resultThrows = document.getElementById("resultThrows");
  const resultAwards = document.getElementById("resultAwards");
  const historyTable = document.getElementById("historyTable");
  const restartBtn = document.getElementById("restartBtn");

  const numbers = [
    20, 1, 18, 4, 13,
    6, 10, 15, 2, 17,
    3, 19, 7, 16, 8,
    11, 14, 9, 12, 5
  ];

  let W = 0;
  let H = 0;
  let boardX = 0;
  let boardY = 0;
  let boardR = 0;
  let dpr = 1;

  let aiming = false;
  let aimX = 0;
  let aimY = 0;
  let spread = 48;
  let spreadDir = -1;

  let dartFlying = false;
  let dart = null;
  let stuckDarts = [];

  let score = 501;
  let round = 1;
  let throwCount = 1;
  let roundStartScore = 501;
  let roundScores = [];
  let throwHistory = [];
  let awardHistory = [];
  let gameFinished = false;

  let audioCtx = null;

  function getAudioContext() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    if (audioCtx.state === "suspended") {
      audioCtx.resume();
    }

    return audioCtx;
  }

  function playTone(freq, start, duration, type, volume) {
    const ac = getAudioContext();
    const osc = ac.createOscillator();
    const gain = ac.createGain();

    osc.type = type || "sine";
    osc.frequency.setValueAtTime(freq, ac.currentTime + start);

    gain.gain.setValueAtTime(0, ac.currentTime + start);
    gain.gain.linearRampToValueAtTime(volume, ac.currentTime + start + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + start + duration);

    osc.connect(gain);
    gain.connect(ac.destination);

    osc.start(ac.currentTime + start);
    osc.stop(ac.currentTime + start + duration + 0.02);
  }

  function playHitSound(point) {
    const p = Math.max(0, point);

    if (p === 0) {
      playTone(130, 0, 0.09, "triangle", 0.12);
      return;
    }

    if (p < 20) {
      playTone(260 + p * 8, 0, 0.10, "square", 0.13);
    } else if (p < 50) {
      playTone(320 + p * 5, 0, 0.10, "square", 0.14);
      playTone(420 + p * 4, 0.06, 0.12, "triangle", 0.10);
    } else {
      playTone(440, 0, 0.13, "sawtooth", 0.16);
      playTone(660, 0.08, 0.15, "triangle", 0.14);
      playTone(880, 0.16, 0.18, "sine", 0.12);
    }
  }

  function playBustSound() {
    const ac = getAudioContext();
    const osc = ac.createOscillator();
    const gain = ac.createGain();

    osc.type = "sawtooth";
    osc.frequency.setValueAtTime(220, ac.currentTime);
    osc.frequency.linearRampToValueAtTime(70, ac.currentTime + 0.45);

    gain.gain.setValueAtTime(0.28, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.45);

    osc.connect(gain);
    gain.connect(ac.destination);

    osc.start();
    osc.stop(ac.currentTime + 0.48);
  }

  function playFanfare() {
    const notes = [523, 659, 784, 1046];

    notes.forEach((freq, i) => {
      playTone(freq, i * 0.11, 0.18, i === 3 ? "sawtooth" : "triangle", 0.16);
    });
  }

  function resize() {
    dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));

    W = window.innerWidth;
    H = window.innerHeight;

    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";

    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    boardX = W / 2;
    boardY = H / 2;
    boardR = Math.min(W, H) * 0.34;

    runStartupDebug();
  }

  function runStartupDebug() {
    const centerOk =
      Math.abs(boardX - W / 2) < 0.01 &&
      Math.abs(boardY - H / 2) < 0.01;

    const radiusOk =
      boardR > 50 &&
      boardX - boardR > -1 &&
      boardX + boardR < W + 1 &&
      boardY - boardR > -1 &&
      boardY + boardR < H + 1;

    const message = centerOk && radiusOk
      ? `DEBUG: BOARD OK x=${Math.round(boardX)} y=${Math.round(boardY)} r=${Math.round(boardR)}`
      : "DEBUG: BOARD ERROR";

    debugText.textContent = message;
    debugText.style.color = centerOk && radiusOk ? "#9f9" : "#f99";

    console.log(message);
  }

  window.addEventListener("resize", resize);
  resize();

  function drawBoard() {
    ctx.save();
    ctx.translate(boardX, boardY);

    const slice = Math.PI * 2 / 20;
    const start = -Math.PI / 2 - slice / 2;

    drawCircle(boardR * 1.08, "#222");
    drawCircle(boardR * 1.02, "#555");

    for (let i = 0; i < 20; i++) {
      const a1 = start + i * slice;
      const a2 = a1 + slice;
      const light = i % 2 === 1;

      drawSector(a1, a2, boardR * 0.62, boardR * 0.95, light ? "#eee" : "#111");
      drawSector(a1, a2, boardR * 0.52, boardR * 0.62, light ? "#1f9d45" : "#c51d23");
      drawSector(a1, a2, boardR * 0.18, boardR * 0.52, light ? "#eee" : "#111");
      drawSector(a1, a2, boardR * 0.95, boardR * 1.00, light ? "#1f9d45" : "#c51d23");

      const mid = (a1 + a2) / 2;

      ctx.fillStyle = "#fff";
      ctx.font = `bold ${Math.max(14, boardR * 0.075)}px sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(
        String(numbers[i]),
        Math.cos(mid) * boardR * 1.18,
        Math.sin(mid) * boardR * 1.18
      );
    }

    drawCircle(boardR * 0.18, "#1f9d45");
    drawCircle(boardR * 0.08, "#c51d23");

    drawWireCircle(boardR * 0.08);
    drawWireCircle(boardR * 0.18);
    drawWireCircle(boardR * 0.52);
    drawWireCircle(boardR * 0.62);
    drawWireCircle(boardR * 0.95);
    drawWireCircle(boardR * 1.00);

    if (DEBUG_MODE) {
      ctx.strokeStyle = "rgba(255,255,255,0.25)";
      ctx.lineWidth = 1;

      ctx.beginPath();
      ctx.moveTo(-8, 0);
      ctx.lineTo(8, 0);
      ctx.moveTo(0, -8);
      ctx.lineTo(0, 8);
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawSector(a1, a2, r1, r2, color) {
    ctx.beginPath();
    ctx.arc(0, 0, r2, a1, a2);
    ctx.arc(0, 0, r1, a2, a1, true);
    ctx.closePath();

    ctx.fillStyle = color;
    ctx.fill();

    ctx.strokeStyle = "rgba(160,160,160,0.7)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawCircle(r, color) {
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
  }

  function drawWireCircle(r) {
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(210,210,210,0.7)";
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function drawMitsubishiDart(size) {
    const s = size || 1;

    ctx.fillStyle = "#ffd400";
    ctx.strokeStyle = "rgba(0,0,0,0.75)";
    ctx.lineWidth = 1.2;

    for (let i = 0; i < 3; i++) {
      ctx.save();
      ctx.rotate(i * Math.PI * 2 / 3);

      ctx.beginPath();
      ctx.moveTo(0, -12 * s);
      ctx.lineTo(7 * s, 0);
      ctx.lineTo(0, 12 * s);
      ctx.lineTo(-7 * s, 0);
      ctx.closePath();

      ctx.fill();
      ctx.stroke();

      ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(0, 0, 2.2 * s, 0, Math.PI * 2);
    ctx.fillStyle = "#fff7a8";
    ctx.fill();
  }

  function drawStuckDarts() {
    for (const d of stuckDarts) {
      ctx.save();
      ctx.translate(d.x, d.y);
      ctx.rotate(d.rot);
      drawMitsubishiDart(0.9);
      ctx.restore();
    }
  }

  function drawFlyingDart() {
    if (!dart) return;

    const scale = Math.max(0.25, 1.15 - dart.t * 0.85);

    ctx.save();
    ctx.translate(dart.x, dart.y);
    ctx.rotate(dart.spin);
    ctx.scale(scale, scale);
    drawMitsubishiDart(1.1);
    ctx.restore();
  }

  function drawAim() {
    if (!aiming) return;

    ctx.save();

    ctx.beginPath();
    ctx.arc(aimX, aimY, spread, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.85)";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(aimX - 14, aimY);
    ctx.lineTo(aimX + 14, aimY);
    ctx.moveTo(aimX, aimY - 14);
    ctx.lineTo(aimX, aimY + 14);
    ctx.strokeStyle = "#fff";
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(aimX, aimY, 3, 0, Math.PI * 2);
    ctx.fillStyle = "#ffd400";
    ctx.fill();

    ctx.restore();
  }

  function updateAim() {
    if (!aiming) return;

    spread += spreadDir * 4.5;

    if (spread < 12) {
      spread = 12;
      spreadDir = 1;
    }

    if (spread > 82) {
      spread = 82;
      spreadDir = -1;
    }
  }

  function startAim(x, y, pointerId) {
    if (dartFlying || gameFinished) return;

    aiming = true;
    aimX = x;
    aimY = y;
    spread = 58;
    spreadDir = -1;

    try {
      canvas.setPointerCapture(pointerId);
    } catch (err) {
      // setPointerCapture非対応環境用。無視してOK。
    }
  }

  function moveAim(x, y) {
    if (!aiming) return;

    aimX = x;
    aimY = y;
  }

  function throwDart() {
    if (!aiming || dartFlying || gameFinished) return;

    aiming = false;

    const angle = Math.random() * Math.PI * 2;
    const distance = Math.sqrt(Math.random()) * spread;

    const tx = aimX + Math.cos(angle) * distance;
    const ty = aimY + Math.sin(angle) * distance;

    dart = {
      sx: W / 2,
      sy: H + 120,
      tx,
      ty,
      x: W / 2,
      y: H + 120,
      t: 0,
      spin: Math.random() * Math.PI * 2,
      finalRot: Math.random() * Math.PI * 2
    };

    dartFlying = true;
  }

  canvas.addEventListener("pointerdown", (e) => {
    e.preventDefault();
    getAudioContext();
    startAim(e.clientX, e.clientY, e.pointerId);
  });

  canvas.addEventListener("pointermove", (e) => {
    e.preventDefault();
    moveAim(e.clientX, e.clientY);
  });

  canvas.addEventListener("pointerup", (e) => {
    e.preventDefault();
    throwDart();
  });

  canvas.addEventListener("pointercancel", () => {
    aiming = false;
  });

  function updateDart() {
    if (!dartFlying || !dart) return;

    dart.t += 0.035;

    if (dart.t >= 1) {
      dart.t = 1;
    }

    const t = easeOutCubic(dart.t);

    dart.x = lerp(dart.sx, dart.tx, t);

    const baseY = lerp(dart.sy, dart.ty, t);
    dart.y = baseY - Math.sin(t * Math.PI) * 170;

    dart.spin += 0.15;

    if (dart.t >= 1) {
      landDart();
    }
  }

  function landDart() {
    dartFlying = false;

    const result = calcScore(dart.tx, dart.ty);
    const point = result.score;

    const bust = score - point < 0;

    if (bust) {
      markCurrentRoundAsBustInvalid();

      throwHistory.push({
        round,
        throwNo: throwCount,
        hit: point,
        area: result.label,
        remaining: roundStartScore,
        note: "BUST"
      });

      playBustSound();
      showScoreOverlay("BUST", 900);

      score = roundStartScore;

      setTimeout(() => nextRound(), 250);

      updateUI();
      return;
    }

    score -= point;
    roundScores.push(result);
    stuckDarts.push({
      x: dart.tx,
      y: dart.ty,
      rot: dart.finalRot
    });

    throwHistory.push({
      round,
      throwNo: throwCount,
      hit: point,
      area: result.label,
      remaining: score,
      note: ""
    });

    playHitSound(point);
    showScoreOverlay(String(point), 550);

    if (score === 0) {
      if (throwCount === 3) {
        checkAward();
      }

      setTimeout(() => finishGame(), 650);

      updateUI();
      return;
    }

    nextThrow();
    updateUI();
  }

  function markCurrentRoundAsBustInvalid() {
    for (const row of throwHistory) {
      if (row.round === round && row.note === "") {
        row.note = "BUSTで無効";
        row.remaining = roundStartScore;
      }
    }
  }

  function nextThrow() {
    throwCount += 1;

    if (throwCount > 3) {
      checkAward();
      nextRound();
    }
  }

  function nextRound() {
    round += 1;
    throwCount = 1;
    roundStartScore = score;
    roundScores = [];
    stuckDarts = [];
    updateUI();
  }

  function checkAward() {
    if (roundScores.length !== 3) return;

    const awards = [];
    const sum = roundScores.reduce((total, item) => total + item.score, 0);

    if (sum === 180) awards.push("TON80");
    else if (sum >= 151) awards.push("HIGH TON");
    else if (sum >= 100) awards.push("LOW TON");

    const allBull = roundScores.every(item => item.ring === "IB" || item.ring === "OB");
    const allInnerBull = roundScores.every(item => item.ring === "IB");

    if (allInnerBull) awards.push("THREE IN THE BLACK");
    if (allBull) awards.push("HAT TRICK");

    const allSameBed = roundScores.every(item => {
      const first = roundScores[0];

      return (
        item.base === first.base &&
        item.ring === first.ring &&
        item.ring !== "MISS"
      );
    });

    if (allSameBed) awards.push("THREE IN A BED");

    const triples = roundScores.filter(item => item.ring === "T");

    if (triples.length === 3) {
      const uniqueTripleNumbers = new Set(triples.map(item => item.base));

      if (uniqueTripleNumbers.size === 3) {
        awards.push("WHITE HORSE");
      }
    }

    if (awards.length > 0) {
      const text = awards.join("\n");

      awardHistory.push({
        round,
        awards: text
      });

      showAwardOverlay(text, 1700);
      playFanfare();
    }
  }

  function showScoreOverlay(text, ms) {
    scoreOverlay.textContent = text;
    scoreOverlay.classList.add("show");

    clearTimeout(showScoreOverlay.timer);

    showScoreOverlay.timer = setTimeout(() => {
      scoreOverlay.classList.remove("show");
    }, ms);
  }

  function showAwardOverlay(text, ms) {
    awardOverlay.textContent = text;
    awardOverlay.classList.add("show");

    clearTimeout(showAwardOverlay.timer);

    showAwardOverlay.timer = setTimeout(() => {
      awardOverlay.classList.remove("show");
    }, ms);
  }

  function calcScore(x, y) {
    const dx = x - boardX;
    const dy = y - boardY;
    const r = Math.sqrt(dx * dx + dy * dy);

    if (r > boardR) {
      return {
        score: 0,
        ring: "MISS",
        base: 0,
        label: "MISS"
      };
    }

    if (r <= boardR * 0.08) {
      return {
        score: 50,
        ring: "IB",
        base: 25,
        label: "INNER BULL"
      };
    }

    if (r <= boardR * 0.18) {
      return {
        score: 25,
        ring: "OB",
        base: 25,
        label: "OUTER BULL"
      };
    }

    const slice = Math.PI * 2 / 20;

    let angle = Math.atan2(dy, dx) + Math.PI / 2;

    if (angle < 0) {
      angle += Math.PI * 2;
    }

    const index = Math.floor((angle + slice / 2) / slice) % 20;
    const base = numbers[index];

    if (r >= boardR * 0.95 && r <= boardR) {
      return {
        score: base * 2,
        ring: "D",
        base,
        label: `D${base}`
      };
    }

    if (r >= boardR * 0.52 && r <= boardR * 0.62) {
      return {
        score: base * 3,
        ring: "T",
        base,
        label: `T${base}`
      };
    }

    return {
      score: base,
      ring: "S",
      base,
      label: `S${base}`
    };
  }

  function updateUI() {
    scoreText.textContent = score;
    roundText.textContent = round;
    throwText.textContent = `${throwCount} / 3`;

    const roundTotal = roundScores.reduce((total, item) => total + item.score, 0);
    roundScoreText.textContent = roundTotal;
  }

  function finishGame() {
    gameFinished = true;
    playFanfare();

    resultRounds.textContent = round;
    resultThrows.textContent = throwHistory.length;
    resultAwards.textContent = awardHistory.length;

    const rows = throwHistory.map((row, index) => {
      const note = row.note ? row.note : "-";

      return `<tr>
        <td>${index + 1}</td>
        <td>${row.round}</td>
        <td>${row.throwNo}</td>
        <td>${escapeHtml(row.area)}</td>
        <td>${row.hit}</td>
        <td>${row.remaining}</td>
        <td>${escapeHtml(note)}</td>
      </tr>`;
    }).join("");

    historyTable.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>ROUND</th>
            <th>THROW</th>
            <th>AREA</th>
            <th>POINT</th>
            <th>REMAIN</th>
            <th>NOTE</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    `;

    resultScreen.classList.add("show");
  }

  function restartGame() {
    score = 501;
    round = 1;
    throwCount = 1;
    roundStartScore = 501;
    roundScores = [];
    throwHistory = [];
    awardHistory = [];
    stuckDarts = [];
    dartFlying = false;
    dart = null;
    aiming = false;
    gameFinished = false;

    resultScreen.classList.remove("show");

    updateUI();
  }

  restartBtn.addEventListener("click", restartGame);

  function escapeHtml(value) {
    return String(value)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function lerp(a, b, t) {
    return a + (b - a) * t;
  }

  function easeOutCubic(t) {
    return 1 - Math.pow(1 - t, 3);
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);

    updateAim();
    updateDart();

    drawBoard();
    drawStuckDarts();
    drawAim();
    drawFlyingDart();

    requestAnimationFrame(loop);
  }

  updateUI();
  loop();
})();
</script>
</body>
</html>
